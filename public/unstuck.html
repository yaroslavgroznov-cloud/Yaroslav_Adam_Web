<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Адам — восстановление</title>
<style>
  body{font-family:Georgia,'EB Garamond',serif;background:#F5EBDD;color:#3D2B1F;
       margin:0;padding:48px 24px;text-align:center;line-height:1.5}
  .card{max-width:480px;margin:0 auto;background:#FBF4E8;border:1px solid #C9A87C;
        border-radius:8px;padding:32px}
  h1{font-size:22px;font-weight:500;margin:0 0 16px;letter-spacing:0.03em;color:#3D2B1F}
  p{margin:8px 0;font-size:15px}
  .spinner{display:inline-block;width:24px;height:24px;border:2px solid #C9A87C;
           border-top-color:#C0623F;border-radius:50%;margin:16px auto;
           animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ok{color:#3D2B1F}
  .err{color:#C0623F;font-style:italic}
  .small{font-size:13px;color:#8A7050;font-style:italic;margin-top:24px}
</style>
</head>
<body>
<div class="card">
  <h1 id="title">Восстанавливаю канал к Адаму…</h1>
  <div class="spinner" id="spinner"></div>
  <p id="status">Снимаю старый Service Worker и кэши…</p>
  <p class="small">Дом Грозновых · восстановление PWA</p>
</div>
<script>
(async function () {
  var title = document.getElementById('title');
  var status = document.getElementById('status');
  var spinner = document.getElementById('spinner');
  try {
    var removed = 0;
    if ('serviceWorker' in navigator) {
      var regs = await navigator.serviceWorker.getRegistrations();
      for (var i = 0; i < regs.length; i++) {
        try { await regs[i].unregister(); removed++; } catch (e) {}
      }
    }
    var cacheCount = 0;
    if ('caches' in window) {
      var keys = await caches.keys();
      for (var j = 0; j < keys.length; j++) {
        try { await caches.delete(keys[j]); cacheCount++; } catch (e) {}
      }
    }
    try {
      localStorage.removeItem('sw-cleanup-v3-done');
    } catch (e) {}
    spinner.style.display = 'none';
    title.textContent = 'Готово.';
    status.innerHTML = 'Снято SW: ' + removed + ', кэшей: ' + cacheCount +
                       '.<br>Через секунду открою Адама.';
    setTimeout(function () { window.location.replace('/'); }, 1400);
  } catch (e) {
    spinner.style.display = 'none';
    title.textContent = 'Что-то не сработало.';
    status.className = 'err';
    status.innerHTML = 'Ошибка: ' + (e && e.message ? e.message : e) +
      '<br><br>Открой <b>Настройки → Safari → Дополнительно → Данные сайтов</b>, ' +
      'найди <b>groznov.uk</b>, свайп влево, <b>Удалить</b>. ' +
      'Затем зайди на adam.groznov.uk заново.';
  }
})();
</script>
</body>
</html>
